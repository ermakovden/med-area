services:
  nginx:
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile
      target: dev
    container_name: ${COMPOSE_PROJECT_NAME}-nginx
    ports:
      - "${APP_WEB_PORT}:80"
    volumes:
      - ./:${APP_PATH}
      - ./docker/nginx/config/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - medarea-network
    depends_on:
      - php

  php:
    build:
      args:
        gid: ${GID}
        uid: ${UID}
        xdebug_idekey: ${XDEBUG_IDEKEY}
        xdebug_client_port: ${XDEBUG_CLIENT_PORT}
        target: dev
      context: .
      dockerfile: ./docker/php/Dockerfile
      target: dev
    container_name: ${COMPOSE_PROJECT_NAME}-php
    volumes:
      - ./:/var/www/app
      - ./docker/php/config/php-fpm.conf:/usr/local/etc/php-fpm.d/www.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "medarea-redis:host-gateway"
    networks:
      - medarea-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    container_name: ${COMPOSE_PROJECT_NAME}-db
    build:
      context: .
      dockerfile: ./docker/postgres/Dockerfile
    volumes:
      - db-data:/var/lib/postgres
      - ./docker/postgres/config/postgres.conf:/etc/postgresql/postgresql.conf
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT}:5432"
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    networks:
      - medarea-network
    healthcheck:
      test: [ "CMD", "pg_isready" ]
      timeout: 10s
      retries: 10

  redis:
    container_name: ${COMPOSE_PROJECT_NAME}-redis
    image: redis:8.2.0-alpine
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - medarea-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 1s
      timeout: 3s
      retries: 30

  scheduler:
    container_name: ${COMPOSE_PROJECT_NAME}-scheduler
    build:
      args:
        gid: ${GID}
        uid: ${UID}
      context: .
      dockerfile: ./docker/php/Dockerfile
      target: scheduler
    volumes:
      - ./:${APP_PATH}
      - ./docker/php/config/php.ini:/usr/local/etc/php/conf.d/php.ini
      - ./docker/php/config/php-fpm.conf:/usr/local/etc/php-fpm-dev.d/www.conf
    restart: on-failure
    depends_on:
      - php

  worker:
    container_name: ${COMPOSE_PROJECT_NAME}-worker
    build:
      args:
        gid: ${GID}
        uid: ${UID}
      context: .
      dockerfile: ./docker/php/Dockerfile
      target: worker
    volumes:
      - ./:${APP_PATH}
      - ./docker/php/config/supervisord.conf:/etc/supervisor/supervisord.conf
      - ./docker/php/config/php.ini:/usr/local/etc/php/conf.d/php.ini
      - ./docker/php/config/php-fpm.conf:/usr/local/etc/php-fpm-dev.d/www.conf
    restart: on-failure
    depends_on:
      - php

  filebeat:
    build:
      context: ./docker/filebeat
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-filebeat
    volumes:
      - ./storage/logs:/var/log/laravel:ro
    networks:
      - medarea-network
    depends_on:
      - logstash
    restart: on-failure

  logstash:
    build:
      context: ./docker/logstash
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-logstash
    ports:
      - "5044:5044"
    networks:
      - medarea-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: on-failure

  elasticsearch:
    image: elasticsearch:9.3.1
    container_name: ${COMPOSE_PROJECT_NAME}-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    networks:
      - medarea-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'" ]
      interval: 10s
      timeout: 10s
      retries: 10

  kibana:
    image: kibana:9.3.1
    container_name: ${COMPOSE_PROJECT_NAME}-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - medarea-network
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  db-data:
  redis-data:
  es-data:

networks:
  medarea-network:
    driver: bridge